name: vigil

services:
  traefik:
    # v3.6+ is required on hosts running Docker Engine >=29 — earlier Traefik
    # releases bundle a Docker client that's hardcoded to API 1.24 and fail
    # outright ("client version 1.24 is too old") since Engine 29 raised its
    # minimum supported API version to 1.40. v3.6 added real negotiation.
    image: traefik:v3.6.22
    restart: unless-stopped
    command:
      - --configFile=/etc/traefik/traefik.yml
    environment:
      TRAEFIK_CERTIFICATESRESOLVERS_LETSENCRYPT_ACME_EMAIL: ${ACME_EMAIL}
      TRAEFIK_CERTIFICATESRESOLVERS_LETSENCRYPT_ACME_CASERVER: ${ACME_CA_SERVER}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/acme.json:/letsencrypt/acme.json
    networks:
      - vigil

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - vigil

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - vigil

  backend:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      PROMETHEUS_FILE_SD_DIR: /prometheus_file_sd
    volumes:
      - ./prometheus/file_sd:/prometheus_file_sd
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - vigil
    labels:
      traefik.enable: "true"
      traefik.http.routers.vigil-backend.rule: Host(`${DOMAIN}`) && PathPrefix(`/api`)
      traefik.http.routers.vigil-backend.entrypoints: websecure
      traefik.http.routers.vigil-backend.tls.certresolver: letsencrypt
      traefik.http.routers.vigil-backend.priority: "10"
      traefik.http.services.vigil-backend.loadbalancer.server.port: "8000"

  celery-worker:
    build: ./backend
    restart: unless-stopped
    command: celery -A app.celery_app worker --loglevel=info --concurrency=4
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      PROMETHEUS_FILE_SD_DIR: /prometheus_file_sd
    volumes:
      - ./prometheus/file_sd:/prometheus_file_sd
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - vigil

  celery-beat:
    build: ./backend
    restart: unless-stopped
    command: celery -A app.celery_app beat --loglevel=info
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - vigil

  frontend:
    build: ./frontend
    restart: unless-stopped
    networks:
      - vigil
    labels:
      traefik.enable: "true"
      traefik.http.routers.vigil-frontend.rule: Host(`${DOMAIN}`)
      traefik.http.routers.vigil-frontend.entrypoints: websecure
      traefik.http.routers.vigil-frontend.tls.certresolver: letsencrypt
      traefik.http.routers.vigil-frontend.priority: "1"
      traefik.http.services.vigil-frontend.loadbalancer.server.port: "80"

  blackbox_exporter:
    image: prom/blackbox-exporter:v0.25.0
    restart: unless-stopped
    cap_add:
      - NET_RAW
    volumes:
      - ./blackbox_exporter/blackbox.yml:/etc/blackbox_exporter/config.yml:ro
    networks:
      - vigil

  prometheus:
    image: prom/prometheus:v2.55.1
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/file_sd:/etc/prometheus/file_sd
      - prometheus_data:/prometheus
    networks:
      - vigil

networks:
  vigil:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
